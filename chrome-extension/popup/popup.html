<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foguetim ERP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: #0F0B1E;
      color: #E2E8F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(124, 58, 237, 0.2);
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), transparent);
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
    }

    /* Views */
    .view {
      display: none;
      padding: 20px 16px;
    }

    .view.active {
      display: block;
    }

    /* Login View */
    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94A3B8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 8px;
      color: #E2E8F0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.15);
    }

    .form-input::placeholder {
      color: #475569;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: #ffffff;
      margin-top: 4px;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: #A78BFA;
    }

    .btn-secondary:hover {
      background: rgba(124, 58, 237, 0.1);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #F87171;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .error-message {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      color: #F87171;
      font-size: 12px;
    }

    .error-message.visible {
      display: block;
    }

    /* Connected View */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10B981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 13px;
      color: #10B981;
      font-weight: 500;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #A78BFA;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: #64748B;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Footer */
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #475569;
      border-top: 1px solid rgba(124, 58, 237, 0.1);
    }

    .footer a {
      color: #7C3AED;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="header-title">Foguetim ERP</span>
  </div>

  <!-- Login View -->
  <div id="loginView" class="view active">
    <div class="form-group">
      <label class="form-label" for="email">E-mail</label>
      <input class="form-input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Senha</label>
      <input class="form-input" type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="loginBtn">Entrar</button>
    <div class="error-message" id="errorMessage"></div>
  </div>

  <!-- Connected View -->
  <div id="connectedView" class="view">
    <div class="status-badge">
      <div class="status-dot"></div>
      <span class="status-text" id="statusText">Conectado</span>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="draftCount">-</div>
        <div class="stat-label">Rascunhos</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="todayCount">-</div>
        <div class="stat-label">Copiados hoje</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="viewDraftsBtn">Ver rascunhos</button>
      <button class="btn btn-danger" id="logoutBtn">Desconectar</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Foguetim ERP v1.0 &middot; <a href="https://foguetim.com.br" target="_blank">foguetim.com.br</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
