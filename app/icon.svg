<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Timm helmet - violet circle -->
  <circle cx="16" cy="16" r="14" fill="url(#g)"/>
  <!-- Visor -->
  <ellipse cx="16" cy="15" rx="9" ry="8" fill="#0F0B1E" opacity="0.85"/>
  <ellipse cx="16" cy="14.5" rx="7.5" ry="6.5" fill="url(#v)" opacity="0.6"/>
  <!-- Reflection -->
  <ellipse cx="12" cy="12" rx="3" ry="2" fill="white" opacity="0.25" transform="rotate(-15 12 12)"/>
  <!-- Antenna -->
  <line x1="16" y1="2" x2="16" y2="5" stroke="#F97316" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="1.5" r="1.5" fill="#F97316"/>
  <defs>
    <linearGradient id="g" x1="2" y1="2" x2="30" y2="30">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="v" x1="7" y1="8" x2="25" y2="22">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>
